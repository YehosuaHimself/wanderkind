name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "staging-pages"
  cancel-in-progress: true  # Cancel previous staging deploys immediately

jobs:
  quality:
    name: Type check & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 50

  build:
    name: Build staging
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Expo web (staging)
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_ENV: staging

      - name: Inject staging banner + PWA tags
        run: |
          # Add staging indicator bar at top of HTML
          sed -i 's|<body>|<body><div style="position:fixed;top:0;left:0;right:0;background:#E09A52;color:#fff;text-align:center;font-size:12px;font-family:monospace;padding:4px;z-index:999999;letter-spacing:1px">STAGING — wanderkind.love/staging</div>|' dist/index.html
          sed -i 's|</head>|<link rel="manifest" href="/manifest.json" />\n<meta name="theme-color" content="#E09A52" />\n<meta name="apple-mobile-web-app-capable" content="yes" />\n<meta name="apple-mobile-web-app-title" content="Wanderkind Staging" />\n</head>|' dist/index.html
          sed -i 's|</body>|<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){})})}</script>\n</body>|' dist/index.html

      - name: Add service worker + assets
        run: |
          cat > dist/sw.js << 'SWEOF'
          const CACHE_NAME = 'wanderkind-staging-v1';
          self.addEventListener('install', () => self.skipWaiting());
          self.addEventListener('activate', (event) => {
            event.waitUntil(caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => self.clients.claim()));
          });
          self.addEventListener('fetch', (event) => {
            event.respondWith(fetch(event.request));
          });
          SWEOF
          cp -r public/* dist/
          # Staging uses a /staging/ subfolder path via CNAME on a different repo
          # For now: deploy to same pages under /staging path
          cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: staging
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
