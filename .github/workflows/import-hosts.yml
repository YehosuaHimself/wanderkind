name: Import Host Data

on:
  schedule:
    - cron: '0 2 * * *'    # 02:00 UTC nightly
  workflow_dispatch:         # manual trigger from GitHub UI
    inputs:
      source:
        description: 'Specific source to run (leave blank for all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no DB writes)'
        type: boolean
        default: false

jobs:
  import:
    name: Import host data from all sources
    runs-on: ubuntu-latest
    timeout-minutes: 90    # full European sweep can take ~60–70 min

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/import/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/import/requirements.txt

      - name: Run import
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WK_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
        run: |
          SOURCE_ARG=""
          if [ -n "${{ github.event.inputs.source }}" ]; then
            SOURCE_ARG="--source ${{ github.event.inputs.source }}"
          fi
          python scripts/import/run_import.py $SOURCE_ARG

      - name: Upload import log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: import-log-${{ github.run_id }}
          path: |
            /tmp/wk-import-*.log
          retention-days: 14
          if-no-files-found: ignore
