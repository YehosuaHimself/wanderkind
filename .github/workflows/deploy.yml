name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Expo web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Add service worker kill switch (unregister old Vite PWA)
        run: |
          cat > dist/sw.js << 'SWEOF'
          self.addEventListener('install', () => self.skipWaiting());
          self.addEventListener('activate', (event) => {
            event.waitUntil(
              caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))))
                .then(() => self.clients.matchAll())
                .then(clients => clients.forEach(c => c.navigate(c.url)))
                .then(() => self.registration.unregister())
            );
          });
          SWEOF
          cp dist/sw.js dist/service-worker.js

      - name: Add custom domain CNAME
        run: echo "wanderkind.love" > dist/CNAME

      - name: Add 404 fallback for SPA routing
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
