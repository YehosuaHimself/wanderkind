name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  quality:
    name: Type check & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 50
        # 50 warnings allowed during migration period — reduce to 0 over time

  build:
    name: Build & deploy
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Expo web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}

      - name: Inject PWA meta tags into HTML
        run: |
          sed -i 's|</head>|<link rel="manifest" href="/manifest.json" />\n<meta name="theme-color" content="#C8762A" />\n<meta name="apple-mobile-web-app-capable" content="yes" />\n<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />\n<meta name="apple-mobile-web-app-title" content="Wanderkind" />\n<link rel="apple-touch-icon" href="/apple-touch-icon.png" />\n<meta name="mobile-web-app-capable" content="yes" />\n<meta name="application-name" content="Wanderkind" />\n<meta name="msapplication-TileColor" content="#C8762A" />\n<meta name="msapplication-TileImage" content="/icon-144.png" />\n</head>|' dist/index.html
          sed -i 's|</body>|<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){})})}</script>\n</body>|' dist/index.html

      - name: Add service worker
        run: |
          cat > dist/sw.js << 'SWEOF'
          const CACHE_NAME = 'wanderkind-v2';
          const APP_SHELL = ['/','/_expo/static/css/','/_expo/static/js/'];

          self.addEventListener('install', () => self.skipWaiting());

          self.addEventListener('activate', (event) => {
            event.waitUntil(
              caches.keys().then(keys =>
                Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
              ).then(() => self.clients.claim())
            );
          });

          self.addEventListener('fetch', (event) => {
            const url = new URL(event.request.url);
            // Cache-first for JS/CSS assets (they have content-hash filenames)
            if (url.pathname.startsWith('/_expo/static/')) {
              event.respondWith(
                caches.open(CACHE_NAME).then(cache =>
                  cache.match(event.request).then(cached =>
                    cached || fetch(event.request).then(response => {
                      cache.put(event.request, response.clone());
                      return response;
                    })
                  )
                )
              );
              return;
            }
            // Network-first for API and dynamic content
            event.respondWith(fetch(event.request).catch(() => caches.match(event.request)));
          });
          SWEOF

      - name: Copy static assets to dist
        run: |
          cp -r public/* dist/
          echo "wanderkind.love" > dist/CNAME
          cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
